services:
  - type: web
    name: ipl2026-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd server && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: EMAIL_VERIFICATION_ENABLED
        value: "False"
      - key: CRICKETDATA_API_KEY
        sync: false
      - key: FANTASY_IPL_SERIES_ID
        value: "87c62aac-bc3c-4738-ab93-19da0690488f"
      - key: SESSION_LIFETIME_HOURS
        value: "24"
      - key: BCRYPT_ROUNDS
        value: "12"
