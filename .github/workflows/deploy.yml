name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scorecard/package-lock.json

      - name: Install dependencies
        working-directory: scorecard
        run: npm ci

      - name: Build
        working-directory: scorecard
        run: npm run build
        env:
          VITE_API_URL: https://ipl2026-api-f9f5231b386c.herokuapp.com/api

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: scorecard/dist
