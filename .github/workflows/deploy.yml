name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-frontend:
    name: Build & Deploy Frontend to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scorecard/package-lock.json

      - name: Install dependencies
        working-directory: scorecard
        run: npm ci

      - name: Build
        working-directory: scorecard
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: scorecard/dist

  deploy-backend:
    name: Trigger Render API Deploy
    runs-on: ubuntu-latest
    needs: deploy-frontend

    steps:
      - name: Trigger Render deploy hook
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

